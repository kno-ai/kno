name: test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (echo "Run 'make fmt' to fix:"; gofmt -l .; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test ./...

      - name: End-to-end tests
        run: ./test/e2e_test.sh

      - name: Staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
